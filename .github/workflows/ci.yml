name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm ci

    - name: Type check (renderer + shared)
      run: npx tsc --noEmit

    - name: Type check (main process)
      run: npx tsc -p tsconfig.main.json --noEmit

    - name: Build TypeScript (main process)
      run: npm run build:electron

    - name: Build React app (renderer)
      run: npm run build

    - name: Run tests
      run: npm run test:ci

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        if-no-files-found: warn

  # E2E tests require Electron + node-pty native module which can't launch in CI.
  # Run locally with: npm run test:e2e

  # Packaging is heavy (full electron-builder across 3 OSes) and redundant on
  # PRs — release.yml builds and publishes installers on v* tags. Run it only on
  # pushes to main as a packaging smoke-test, so PR CI stays fast (build + test).
  package:
    name: Package Electron App
    runs-on: ${{ matrix.os }}
    needs: [build]
    if: github.event_name == 'push'

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm ci
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Package app
      run: npm run package -- --publish never
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: omnidesk-${{ matrix.os }}
        path: |
          release/**/*.exe
          release/**/*.dmg
          release/**/*.AppImage
          release/**/*.deb
        if-no-files-found: warn
