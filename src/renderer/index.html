<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- worker-src/script-src allow blob: so the STT AudioWorklet (built from an
         inline blob: URL in pcm-recorder.ts) can load. Blobs are same-origin only;
         without this Chromium rejects addModule with a raw "user aborted" error. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:;" />
    <title>OmniDesk</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
